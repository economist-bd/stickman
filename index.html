<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Fighter - Step 2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            background-color: #87CEEB;
            margin: 0 auto;
        }
        
        /* হেলথ বারের ডিজাইন */
        #ui-container {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .health-box {
            width: 40%;
            height: 30px;
            background-color: red; /* ড্যামেজ খেলে লাল দেখাবে */
            border: 3px solid white;
            border-radius: 5px;
        }
        #playerHealth, #enemyHealth {
            height: 100%;
            background-color: #2ecc71; /* সবুজের মানে হেলথ আছে */
            transition: width 0.2s ease;
        }
        #enemyHealth {
            float: right; /* শত্রুর হেলথ ডানদিক থেকে কমবে */
        }

        /* মোবাইল কন্ট্রোল বাটনের ডিজাইন */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .control-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background-color: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn:active {
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="health-box">
            <div id="playerHealth" style="width: 100%;"></div>
        </div>
        <div style="color: white; font-weight: bold; font-size: 24px;">VS</div>
        <div class="health-box">
            <div id="enemyHealth" style="width: 100%;"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn" id="leftBtn">Left</div>
            <div class="btn" id="rightBtn">Right</div>
        </div>
        <div class="control-group">
            <div class="btn" id="jumpBtn">Jump</div>
            <div class="btn" id="atkBtn">Attack</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const gravity = 0.6;

        class Sprite {
            constructor({position, velocity, color = 'blue', offset}) {
                this.position = position;
                this.velocity = velocity;
                this.width = 40;
                this.height = 120;
                this.color = color;
                this.lastKey;
                this.health = 100; // নতুন: হেলথ পয়েন্ট
                
                // নতুন: অ্যাটাক বক্স (Hitbox)
                this.attackBox = {
                    position: { x: this.position.x, y: this.position.y },
                    offset: offset,
                    width: 100,
                    height: 50
                };
                this.isAttacking = false;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.position.x, this.position.y, this.width, this.height);

                // অ্যাটাক করলে তলোয়ার বা ঘুষির মতো একটি হলুদ বক্স দেখাবে
                if (this.isAttacking) {
                    ctx.fillStyle = 'yellow';
                    ctx.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
                }
            }

            update() {
                this.draw();
                
                // অ্যাটাক বক্স সবসময় প্লেয়ারের সাথে সাথে থাকবে
                this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
                this.attackBox.position.y = this.position.y + 20; // একটু নিচের দিকে অ্যাটাক হবে

                this.position.x += this.velocity.x;
                this.position.y += this.velocity.y;

                if (this.position.y + this.height + this.velocity.y >= canvas.height - 100) {
                    this.velocity.y = 0;
                    this.position.y = canvas.height - 100 - this.height;
                } else {
                    this.velocity.y += gravity;
                }
            }

            // নতুন: অ্যাটাক ফাংশন
            attack() {
                this.isAttacking = true;
                setTimeout(() => {
                    this.isAttacking = false;
                }, 100); // ১০০ মিলি-সেকেন্ড পর অ্যাটাক শেষ হবে
            }
        }

        // প্লেয়ার (নীল)
        const player = new Sprite({
            position: { x: 50, y: 0 },
            velocity: { x: 0, y: 0 },
            offset: { x: 0, y: 0 } // ডানদিকে অ্যাটাক করবে
        });

        // শত্রু (লাল)
        const enemy = new Sprite({
            position: { x: canvas.width - 100, y: 0 },
            velocity: { x: 0, y: 0 },
            color: 'red',
            offset: { x: -60, y: 0 } // বামদিকে অ্যাটাক করবে
        });

        const keys = {
            left: { pressed: false },
            right: { pressed: false }
        };

        // কলিশন ডিটেকশন (আঘাত লেগেছে কিনা যাচাই করার ফর্মুলা)
        function rectangularCollision({ rectangle1, rectangle2 }) {
            return (
                rectangle1.attackBox.position.x + rectangle1.attackBox.width >= rectangle2.position.x &&
                rectangle1.attackBox.position.x <= rectangle2.position.x + rectangle2.width &&
                rectangle1.attackBox.position.y + rectangle1.attackBox.height >= rectangle2.position.y &&
                rectangle1.attackBox.position.y <= rectangle2.position.y + rectangle2.height
            )
        }

        function animate() {
            window.requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // মাটি আঁকা
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

            player.update();
            enemy.update();

            // প্লেয়ার মুভমেন্ট
            player.velocity.x = 0;
            if (keys.left.pressed && player.lastKey === 'left') {
                player.velocity.x = -5;
            } else if (keys.right.pressed && player.lastKey === 'right') {
                player.velocity.x = 5;
            }

            // কলিশন ডিটেকশন: প্লেয়ার যদি অ্যাটাক করে এবং তা শত্রুর গায়ে লাগে
            if (rectangularCollision({ rectangle1: player, rectangle2: enemy }) && player.isAttacking) {
                player.isAttacking = false; // একবার আঘাত লাগলে অ্যাটাক বন্ধ হবে
                enemy.health -= 10; // শত্রুর হেলথ কমবে
                document.querySelector('#enemyHealth').style.width = enemy.health + '%'; // UI আপডেট
            }
        }

        animate();

        // ডেস্কটপ কন্ট্রোল
        window.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'd':
                case 'ArrowRight':
                    keys.right.pressed = true;
                    player.lastKey = 'right';
                    break;
                case 'a':
                case 'ArrowLeft':
                    keys.left.pressed = true;
                    player.lastKey = 'left';
                    break;
                case 'w':
                case 'ArrowUp':
                    if(player.velocity.y === 0) player.velocity.y = -15;
                    break;
                case ' ': // স্পেসবার দিয়ে অ্যাটাক
                    player.attack();
                    break;
            }
        });

        window.addEventListener('keyup', (event) => {
            switch (event.key) {
                case 'd':
                case 'ArrowRight':
                    keys.right.pressed = false;
                    break;
                case 'a':
                case 'ArrowLeft':
                    keys.left.pressed = false;
                    break;
            }
        });

        // মোবাইল টাচ কন্ট্রোল
        const setupTouch = (id, action) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if(action === 'jump') {
                    if(player.velocity.y === 0) player.velocity.y = -15;
                } else if(action === 'attack') {
                    player.attack(); // মোবাইলে অ্যাটাক বাটন
                } else if(action === 'left' || action === 'right') {
                    keys[action].pressed = true;
                    player.lastKey = action;
                }
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                if(action === 'left' || action === 'right') keys[action].pressed = false;
            });
        };

        setupTouch('leftBtn', 'left');
        setupTouch('rightBtn', 'right');
        setupTouch('jumpBtn', 'jump');
        setupTouch('atkBtn', 'attack'); // অ্যাটাক বাটন যুক্ত করা হলো

    </script>
</body>
</html>
